<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JS Diasoft</title>
  </head>
  <body>
    <script defer>
      const getOptions = (n) => {
        const arr = [];
        for (let i = 1; i <= n; i++) {
          arr.push({textContent: `Option ${i}`, value: `opt${i}`});
        }
        return arr;
      }
      const onLoad = (evt) => {
        const componentName = evt.target.dataset.name;
        const options = getOptions(3);
        console.log("Component loaded:", componentName);
        const element = document.createElement(componentName);
        options.forEach((singleOption) => {
          const option = document.createElement('option');
          option.textContent = singleOption.textContent;
          option.value = singleOption.value;
          element.append(option);
        });
        document.body.append(element);
      };

      const onError = (err) => {
        console.error("Error loading component:", err);
      };

      const components = ["my-select"];

      components.forEach((component) => {
        const script = document.createElement("script");
        script.src = `./${component}.js`;
        script.dataset.name = component;
        script.addEventListener("load", onLoad);
        script.addEventListener("error", onError);
        document.body.append(script);
      });
    </script>
  </body>
</html>
